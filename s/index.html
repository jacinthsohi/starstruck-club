<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Starstruck — You're invited</title>
  <meta name="description" content="Join me on Starstruck — a journal of Michelin-starred dining.">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Starstruck">
  <meta property="og:url" content="https://starstruck.club/s/">
  <meta property="og:title" content="You're invited to Starstruck">
  <meta property="og:description" content="Join me on Starstruck — a journal of Michelin-starred dining.">
  <meta property="og:image" content="https://starstruck.club/og-invite.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="You're invited to Starstruck">
  <meta name="twitter:description" content="Join me on Starstruck — a journal of Michelin-starred dining.">
  <meta name="twitter:image" content="https://starstruck.club/og-invite.png">
  <style>
    html,body{margin:0;height:100%;background:#7a1a1f;color:#faf6ed;
      font-family:Georgia,'Times New Roman',serif;display:flex;align-items:center;justify-content:center;text-align:center}
    .wrap{padding:2rem;max-width:520px}
    .mark{height:84px;width:auto;margin:0 0 1.4rem;display:inline-block}
    h1{font-size:2.6rem;font-style:italic;margin:0 0 .4rem}
    .sub{font-family:-apple-system,Helvetica,Arial,sans-serif;letter-spacing:.16em;
      text-transform:uppercase;font-size:.78rem;opacity:.72;margin:0 0 1.6rem}
    .codebox{display:none;margin:0 0 1.6rem}
    .codelabel{font-family:-apple-system,Helvetica,Arial,sans-serif;letter-spacing:.16em;
      text-transform:uppercase;font-size:.7rem;opacity:.7;margin:0 0 .5rem}
    .code{font-size:2rem;letter-spacing:.25em;background:rgba(250,246,237,.12);
      border:1px solid rgba(250,246,237,.3);border-radius:12px;padding:.6rem 1.1rem;display:inline-block}
    a.btn{display:inline-block;background:#faf6ed;color:#7a1a1f;text-decoration:none;
      font-family:-apple-system,Helvetica,Arial,sans-serif;font-weight:600;padding:.85rem 1.7rem;border-radius:10px}
    .hint{font-family:-apple-system,Helvetica,Arial,sans-serif;font-size:.85rem;opacity:.75;
      margin-top:1.4rem;line-height:1.55}
  </style>
</head>
<body>
  <div class="wrap">
    <svg class="mark" viewBox="-50 -240 100 360" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <g fill="none" stroke="#faf6ed" stroke-width="6.0" stroke-linejoin="round" stroke-linecap="round">
        <line x1="-24" y1="-145" x2="-24" y2="-80"/>
        <line x1="-8"  y1="-145" x2="-8"  y2="-80"/>
        <line x1="8"   y1="-145" x2="8"   y2="-80"/>
        <line x1="24"  y1="-145" x2="24"  y2="-80"/>
        <path d="M -24,-80 Q -28,-65 -22,-55 Q -16,-48 -12,-40 L -8,80"/>
        <path d="M  24,-80 Q  28,-65  22,-55 Q  16,-48  12,-40 L  8,80"/>
      </g>
      <g transform="translate(0, -175) rotate(-20)">
        <path d="M -0.31,-41.05 Q 0.00,-42.00 0.31,-41.05 L 9.10,-13.90 Q 9.40,-12.94 10.40,-12.95 L 38.94,-12.98 Q 39.94,-12.98 39.13,-12.39 L 16.03,4.36 Q 15.22,4.94 15.53,5.89 L 24.38,33.03 Q 24.69,33.98 23.88,33.39 L 0.81,16.59 Q 0.00,16.00 -0.81,16.59 L -23.88,33.39 Q -24.69,33.98 -24.38,33.03 L -15.53,5.89 Q -15.22,4.94 -16.03,4.36 L -39.13,-12.39 Q -39.94,-12.98 -38.94,-12.98 L -10.40,-12.95 Q -9.40,-12.94 -9.10,-13.90 L -0.31,-41.05 Z"
              fill="none" stroke="#faf6ed" stroke-width="4.8" stroke-linejoin="miter" stroke-miterlimit="10" stroke-linecap="round"/>
      </g>
    </svg>
    <h1 id="title">You're invited</h1>
    <p class="sub" id="subtitle">to Starstruck — a journal of starred dining</p>
    <div class="codebox" id="codebox">
      <div class="codelabel">Your friend's invite code</div>
      <div class="code" id="code"></div>
    </div>
    <div><a class="btn" href="https://testflight.apple.com/join/96nFHqVK">Get the beta</a></div>
    <p class="hint" id="hint">Install the app, then add your friend under Friends &rarr; Add a friend using the code above.</p>
  </div>
  <script>
    // Code can arrive as ?c=CODE (current links) or /s/CODE (older links).
    var q = new URLSearchParams(location.search).get('c');
    var m = location.pathname.match(/\/s\/([A-Za-z0-9]+)/);
    var code = (q || (m && m[1]) || '').toUpperCase();
    if (code) {
      document.getElementById('code').textContent = code;
      document.getElementById('codebox').style.display = 'block';
    } else {
      document.getElementById('title').textContent = 'Starstruck';
      document.getElementById('subtitle').textContent = 'A journal of starred dining';
      document.getElementById('hint').textContent = 'Install the beta to start your dining journal.';
    }
  </script>
</body>
</html>
